<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Attendance - etlab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/faculty-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-flask"></i>
                <span class="brand-logo">etlab</span>
            </div>
            <div class="sidebar-menu">
                <a href="faculty-dashboard.html" class="menu-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="mark-attendance.html" class="menu-item"><i class="fas fa-clipboard-check"></i> Mark
                    Attendance</a>
                <a href="view-attendance.html" class="menu-item active"><i class="fas fa-eye"></i> View Attendance</a>
                <a href="#" class="menu-item"><i class="fas fa-chalkboard-teacher"></i> My Classes</a>
                <a href="#" class="menu-item"><i class="fas fa-tasks"></i> Assignments</a>
                <a href="#" class="menu-item"><i class="fas fa-chart-line"></i> Results Entry</a>
                <a href="#" class="menu-item"><i class="fas fa-file-alt"></i> User Manual</a>
                <a href="index.html" class="menu-item" style="color: #dc3545; margin-top: auto;"><i
                        class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Header -->
            <header class="top-header">
                <div class="header-left">
                    <i class="fas fa-flask header-icon"></i>
                    <span class="header-title">Adi Shankara Institute of Engineering and Technology</span>
                </div>
                <div class="header-right">
                    <span class="user-name" id="username-display"></span>
                    <i class="fas fa-envelope"></i>
                    <span>Messages</span>
                    <i class="fas fa-bell"></i>
                    <a href="index.html" class="logout-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </div>
            </header>

            <!-- Breadcrumb -->
            <div class="breadcrumb">
                <i class="fas fa-home"></i> Home <i class="fas fa-chevron-right"></i> View Attendance
            </div>

            <div class="content-scroll">
                <div class="attendance-container">
                    <!-- Page Header -->
                    <div class="attendance-header">
                        <h2><i class="fas fa-eye"></i> Attendance Records</h2>
                        <button class="btn-primary" onclick="window.location.href='mark-attendance.html'">
                            <i class="fas fa-plus"></i> Mark New Attendance
                        </button>
                    </div>

                    <!-- Records List -->
                    <div class="records-container" id="records-list">
                        <!-- Records will be populated by JavaScript -->
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <footer class="dashboard-footer">
                © 2025 Etuwa Concepts. All rights reserved
            </footer>
        </main>
    </div>

    <!-- Detail Modal -->
    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Attendance Details</h3>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Details will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        // Display username and adjust sidebar
        window.addEventListener('DOMContentLoaded', function () {
            const username = sessionStorage.getItem('username');
            const userType = sessionStorage.getItem('userType');
            const usernameDisplay = document.getElementById('username-display');
            const sidebarMenu = document.querySelector('.sidebar-menu');

            if (username && usernameDisplay) {
                usernameDisplay.textContent = username;
            }

            // Adjust sidebar based on user type
            if (userType === 'agent' && sidebarMenu) {
                sidebarMenu.innerHTML = `
                    <a href="agent-attendance.html" class="menu-item"><i class="fas fa-robot"></i> Automated Attendance</a>
                    <a href="view-attendance.html" class="menu-item active"><i class="fas fa-eye"></i> View Records</a>
                    <a href="index.html" class="menu-item" style="color: #dc3545; margin-top: auto;"><i class="fas fa-sign-out-alt"></i> Logout</a>
                `;
                // Update brand logo/icon for agent
                const sidebarHeader = document.querySelector('.sidebar-header');
                if (sidebarHeader) {
                    sidebarHeader.innerHTML = '<i class="fas fa-robot"></i> <span class="brand-logo">etlab Agent</span>';
                }
            } else if (userType === 'faculty' && sidebarMenu) {
                // Keep faculty sidebar or update to ensure links are correct
                sidebarMenu.innerHTML = `
                    <a href="faculty-dashboard.html" class="menu-item"><i class="fas fa-home"></i> Dashboard</a>
                    <a href="mark-attendance.html" class="menu-item"><i class="fas fa-clipboard-check"></i> Mark Attendance</a>
                    <a href="view-attendance.html" class="menu-item active"><i class="fas fa-eye"></i> View Attendance</a>
                    <a href="#" class="menu-item"><i class="fas fa-chalkboard-teacher"></i> My Classes</a>
                    <a href="#" class="menu-item"><i class="fas fa-tasks"></i> Assignments</a>
                    <a href="#" class="menu-item"><i class="fas fa-chart-line"></i> Results Entry</a>
                    <a href="#" class="menu-item"><i class="fas fa-file-alt"></i> User Manual</a>
                    <a href="index.html" class="menu-item" style="color: #dc3545; margin-top: auto;"><i class="fas fa-sign-out-alt"></i> Logout</a>
                `;
            }

            loadAttendanceRecords();
        });

        async function loadAttendanceRecords() {
            const recordsList = document.getElementById('records-list');

            try {
                const response = await fetch('/api/attendance');
                if (!response.ok) throw new Error('Failed to fetch records');
                const savedRecords = await response.json();

                if (savedRecords.length === 0) {
                    recordsList.innerHTML = `
                        <div class="no-records">
                            <i class="fas fa-inbox"></i>
                            <p>No attendance records found on server</p>
                            <button class="btn-primary" onclick="window.location.href='mark-attendance.html'">
                                Mark Attendance
                            </button>
                        </div>
                    `;
                    return;
                }

                recordsList.innerHTML = savedRecords.map(record => {
                    const date = new Date(record.date);
                    const dateStr = date.toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });
                    const timeStr = date.toLocaleTimeString('en-US', {
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    return `
                        <div class="record-card">
                            <div class="record-header">
                                <div>
                                    <h4>${record.class}</h4>
                                    <p class="record-date"><i class="fas fa-calendar"></i> ${dateStr} at ${timeStr}</p>
                                    <p class="record-faculty"><i class="fas fa-user"></i> ${record.faculty}</p>
                                </div>
                                <button class="btn-view" onclick="viewDetails(${record.id})">
                                    <i class="fas fa-eye"></i> View Details
                                </button>
                            </div>
                            <div class="record-summary">
                                <div class="summary-stat">
                                <span class="stat-label">Hour</span>
                                <span class="stat-value">${record.hour}</span>
                            </div>
                            <div class="summary-stat">
                                <span class="stat-label">Total</span>
                                <span class="stat-value">${record.summary.total}</span>
                            </div>
                                <div class="summary-stat present">
                                    <span class="stat-label">Present</span>
                                    <span class="stat-value">${record.summary.present}</span>
                                </div>
                                <div class="summary-stat absent">
                                    <span class="stat-label">Absent</span>
                                    <span class="stat-value">${record.summary.absent}</span>
                                </div>
                                <div class="summary-stat">
                                    <span class="stat-label">Percentage</span>
                                    <span class="stat-value">${Math.round((record.summary.present / record.summary.total) * 100)}%</span>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading records:', error);
                recordsList.innerHTML = `<p class="error">Error loading records from server. Please ensure the server is running.</p>`;
            }
        }

        async function viewDetails(recordId) {
            try {
                const response = await fetch('/api/attendance');
                const savedRecords = await response.json();
                const record = savedRecords.find(r => r.id === recordId);

                if (!record) return;

                const modalBody = document.getElementById('modal-body');
                const date = new Date(record.date);
                const dateStr = date.toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                modalBody.innerHTML = `
                    <div class="detail-info">
                        <p><strong>Class:</strong> ${record.class}</p>
                        <p><strong>Date & Time:</strong> ${dateStr}</p>
                        <p><strong>Faculty:</strong> ${record.faculty}</p>
                    </div>
                    <table class="detail-table">
                        <thead>
                            <tr>
                                <th>Roll No</th>
                                <th>Student Name</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${record.students.map(student => `
                                <tr>
                                    <td>${student.rollNo}</td>
                                    <td>${student.name}</td>
                                    <td>
                                        <span class="status-badge ${student.status}">
                                            ${student.status === 'present' ?
                        '<i class="fas fa-check"></i> Present' :
                        '<i class="fas fa-times"></i> Absent'}
                                        </span>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;

                document.getElementById('detail-modal').style.display = 'flex';
            } catch (error) {
                console.error('Error viewing details:', error);
                alert('Error loading record details.');
            }
        }

        function closeModal() {
            document.getElementById('detail-modal').style.display = 'none';
        }

        // Close modal when clicking outside
        window.onclick = function (event) {
            const modal = document.getElementById('detail-modal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }
    </script>
</body>

</html>
